apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: devops-toolkit
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/salim-0018/DevOps-Toolkit-Pro.git
    targetRevision: feature/settings
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-toolkit

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
