apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-toolkit

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: paul48/devops-frontend:latest

        ports:
        - containerPort: 80
